<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duckie Talk ^+^_</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --bg-color: #f0ede5; --chat-bg: #ffffff; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; background: var(--bg-color); transition: background 0.3s; }
        
        .header { padding: 10px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.5); }
        .controls { display: flex; gap: 5px; }
        select { padding: 5px; border-radius: 10px; border: none; background: white; }
        
        #chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; background: var(--chat-bg); font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user-msg { background: #dcf8c6; align-self: flex-end; }
        .ai-msg { background: var(--chat-bg); align-self: flex-start; }
        
        .input-area { padding: 10px; background: white; display: flex; gap: 8px; border-top: 1px solid #ddd; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .btn { padding: 10px 15px; border-radius: 20px; background: #075e54; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="controls">
            <select onchange="changeTheme(this.value)">
                <option value="#f0ede5">Clásico</option>
                <option value="#e3f2fd">Azul Suave</option>
                <option value="#ede7f6">Púrpura Claro</option>
                <option value="#212121">Modo Noche</option>
            </select>
            <select id="ai-mode">
                <option value="Amistoso">Amistoso</option>
                <option value="Profesional">Profesional</option>
                <option value="Creativo">Creativo</option>
            </select>
        </div>
        <div class="controls">
            <span onclick="addMessage('🦆', 'user')">🦆</span>
            <span onclick="addMessage('✨', 'user')">✨</span>
            <span onclick="addMessage('💜', 'user')">💜</span>
            <span onclick="addMessage('💚', 'user')">💚</span>
        </div>
    </div>

    <div id="chat-container"></div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Dile algo a Duckie...">
        <button class="btn" onclick="sendMessage()">➤</button>
        <button class="btn" onclick="startVoice()">🎤</button>
    </div>

    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        function changeTheme(color) {
            document.documentElement.style.setProperty('--bg-color', color);
        }

        function addMessage(text, type) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const mode = document.getElementById('ai-mode').value;
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            input.value = "";
            addMessage("Procesando...", 'ai');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Actúa en modo ${mode}. Usuario dijo: ${text}` }] }] })
                });
                const data = await response.json();
                document.getElementById('chat-container').lastElementChild.remove();
                addMessage(data.candidates[0].content.parts[0].text, 'ai');
            } catch (e) {
                document.getElementById('chat-container').lastElementChild.remove();
                addMessage("Error técnico. Verifica tu conexión.", 'ai');
            }
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.start();
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                sendMessage();
            };
        }
    </script>
</body>
</html>
