<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duckie Talk ^+^_</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column;
            background: url('IMG_0635.jpeg') no-repeat center center fixed; background-size: cover;
        }
        #chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; background: white; font-size: 14px; }
        .user-msg { background: #76ff03; align-self: flex-end; }
        .ai-msg { background: #ffffff; align-self: flex-start; }
        .input-area { padding: 10px; background: white; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px; border-radius: 20px; border: none; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Dile algo a Duckie...">
        <button onclick="sendMessage()">➤</button>
    </div>

    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        // URL corregida para la API de Gemini 1.5 Flash
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            document.getElementById('chat-container').appendChild(div);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const texto = input.value.trim();
            if(!texto) return;

            addMessage(texto, 'user');
            input.value = "";
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    addMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    throw new Error("Respuesta inválida del servidor");
                }
            } catch (err) {
                addMessage("Error técnico: " + err.message + ". Verifica el código.", 'ai');
            }
        }
    </script>
</body>
</html>
