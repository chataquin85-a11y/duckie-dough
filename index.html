                    history.push({ role: "model", parts: [{ text: reply }] });

                    addMsg("Error: Verificando conexión...", 'ai');
                }
            } catch (e) {
                loader.remove();
                addMsg("Error de red: " + e.message, 'ai');
            }
        }
