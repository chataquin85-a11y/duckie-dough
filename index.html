```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Duckie Talk Pro - Full Suite</title>
    <style>
        :root { --primary: #6a1b9a; --bg: #f5f5f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); }
        #sidebar { width: 250px; background: #333; color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #main { flex: 1; display: flex; flex-direction: column; }
        .window { flex: 1; padding: 20px; overflow-y: auto; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 4px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Duckie Talk Pro</h3>
        <button onclick="show('chat')">Chat</button>
        <button onclick="show('settings')">Ajustes</button>
        <button onclick="show('files')">Archivos y Media</button>
        <button onclick="show('privacy')">Privacidad</button>
    </div>
    <div id="main">
        <div id="chat" class="window">
            <h3>Centro de Chat</h3>
            <div id="chat-box" style="height: 400px; border: 1px solid #ccc; margin-bottom: 10px; padding: 10px; background: white; overflow-y: auto;"></div>
            <input type="password" id="apiKeyInput" placeholder="Pega aquí tu llave AIza..." style="margin-bottom: 10px;">
            <input type="text" id="in" placeholder="Mensaje...">
            <button onclick="enviar()">Enviar</button>
        </div>
        <div id="settings" class="window" style="display:none;">
            <h3>Ajustes Avanzados</h3>
            <div class="settings-grid">
                <div class="card">Lenguaje: <select><option>Español</option><option>English</option></select></div>
                <div class="card">Tema: <select><option>Dark</option><option>Light</option></select></div>
                <div class="card">Notificaciones: <input type="checkbox" checked> Activar</div>
                <div class="card">Micrófono/Cámara: <button>Acceder</button></div>
            </div>
        </div>
        <div id="files" class="window" style="display:none;">
            <h3>Archivos, Docs y Media</h3>
            <div class="card"><input type="file"> <button>Subir Archivo</button></div>
        </div>
        <div id="privacy" class="window" style="display:none;">
            <h3>Privacidad Avanzada</h3>
            <div class="card">Modo Incógnito: <input type="checkbox"></div>
            <div class="card">Borrar historial al salir: <input type="checkbox"></div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.window').forEach(w => w.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        
        async function enviar() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const text = document.getElementById('in').value;
            const chat = document.getElementById('chat-box');
            if (!key) { alert("¡Pega tu llave primero!"); return; }
            chat.innerHTML += `<div><b>Tú:</b> ${text}</div>`;
            // Esta estructura ya está lista para cuando se libere el cupo
            document.getElementById('in').value = "";
        }
    </script>
</body>
</html>
