<body>
    <div class="app-container">
        <div class="header">
            <button class="icon-btn" onclick="document.getElementById('panel').style.display='block'">⚙️</button>
            <button class="icon-btn">🦆</button>
        </div>

        <div id="panel">
            <h3>Configuración</h3>
            <label>Idioma: </label>
            <select id="lang"><option value="es">Español</option><option value="en">English</option></select>
            <br><br>
            <label>Tema: </label>
            <button onclick="document.body.className=''">Claro</button>
            <button onclick="document.body.className='dark'">Oscuro</button>
            <br><br><button onclick="document.getElementById('panel').style.display='none'">Cerrar</button>

        <div id="chat"></div>

        <div class="bottom-bar">
            <button class="icon-btn" onclick="enviar()">➤</button>
            <input type="text" id="in" placeholder="Escribe algo...">
            <button class="icon-btn" id="mic">🎤</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        
        async function enviar() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const texto = input.value;
            if(!texto) return;
            chat.innerHTML += `<div class="message u">${texto}</div>`;
            input.value = "";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });
                const data = await response.json();
                const respuesta = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="message a">${respuesta}</div>`;
            } catch(e) { chat.innerHTML += `<div class="message a">Duckie está trabajando.</div>`; }
        }

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.onresult = (e) => { document.getElementById('in').value = e.results[0][0].transcript; };
        document.getElementById('mic').onclick = () => rec.start();
    </script>
</body>
