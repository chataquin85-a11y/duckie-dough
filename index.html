            chat.innerHTML += `<div class="message u">${texto}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

                chat.scrollTop = chat.scrollHeight;
            } catch(e) { chat.innerHTML += `<div class="message a">Oops! Error connecting. Try again.</div>`; }
        }

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.onresult = (e) => { document.getElementById('in').value = e.results[0][0].transcript; };
        document.getElementById('mic').onclick = () => { try { rec.start(); } catch(err) { console.log(err); } };
