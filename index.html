        // Configuración de Firebase - Base del Hito 3 y Hito 4
        const firebaseConfig = {
            apiKey: "TU_API_KEY_FIREBASE",
            authDomain: "TU_PROJECT_ID.firebaseapp.com",
            projectId: "TU_PROJECT_ID",

            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);

        // Autenticación para persistencia de datos
        signInAnonymously(auth).then(() => console.log("Duckie autenticado en sistema profesional"));

        // Función de persistencia de datos (Hito 3)
        window.guardarConversacion = async (userMsg, aiMsg) => {
            try {
                await addDoc(collection(db, "conversations"), {
                    user: userMsg,
                    ai: aiMsg,
                    timestamp: serverTimestamp()
                });
            } catch (e) { console.error("Error al guardar en Firebase:", e); }
        };

    <div class="app-container">
        <div class="header">Duckie Talk Pro 🦆✨</div>
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="in" placeholder="Escribe tu mensaje aquí...">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>
    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function enviarMensaje() {
            const input = document.getElementById('in');
            const texto = input.value.trim();
            if(!texto) return;
            
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="message u">${texto}</div>`;
            input.value = "";
            
            // Indicador de "Escribiendo"
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerText = "Duckie está escribiendo...";
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] }) 
                });
                const data = await res.json();
                typing.remove();
                
                if(data.candidates) {
                    const respuesta = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="message a">${respuesta}</div>`;
                    // Persistencia en Firebase (Hito 3)
                    if(window.guardarConversacion) window.guardarConversacion(texto, respuesta);
                }
            } catch(e) { 
                typing.remove();
                chat.innerHTML += `<div class="message a">Error de conexión: ${e.message}</div>`; 
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
