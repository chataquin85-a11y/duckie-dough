    <div class="app-window">
        <div class="header">
            <div class="header-title">DUCKIE TALK - DESKTOP</div>

        <div id="chat">
            <div class="msg duckie">Modo escritorio activo. ¡Listo cuando tú lo estés!</div>

    <script>
        // PEGA TU NUEVA KEY AQUÍ
        const API_KEY = "AQ.Ab8RN6LH0QC-Ceql2bU0fjRXNuhjTA-XeMfcI5xGOqqhkUax3A"; 
        
        async function enviar() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const text = input.value;
            if(!text) return;
            
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
                });
                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    chat.innerHTML += `<div class="msg duckie">${data.candidates[0].content.parts[0].text}</div>`;
                } else {
                    chat.innerHTML += `<div class="msg duckie" style="color:red">Error: Fallo en la conexión. Revisa la consola.</div>`;
                }
            } catch(e) { 
                chat.innerHTML += `<div class="msg duckie" style="color:red">Error: Red inalcanzable.</div>`; 
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
