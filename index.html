```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk Pro - Profesional</title>
    <style>
        :root { --bg: #ffffff; --text: #333; --primary: #4a148c; }
        .dark { --bg: #121212; --text: #eee; --primary: #7b1fa2; }
        body { margin: 0; background: var(--primary); font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .app-container { width: 100%; max-width: 500px; height: 90vh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; border-radius: 20px; overflow: hidden; position: relative; transition: all 0.3s; }
        .header { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .u { background: var(--primary); color: white; align-self: flex-end; }
        .a { background: #eee; color: #333; align-self: flex-start; }
        .bottom-bar { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; background: var(--bg); color: var(--text); }
        .btn { border: none; padding: 10px; border-radius: 20px; cursor: pointer; background: #e1bee7; }
        #settings-panel, #sticker-panel { display: none; position: absolute; top: 60px; left: 10px; right: 10px; background: white; color: #333; padding: 20px; border-radius: 15px; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <div class="header">
            <button onclick="document.getElementById('settings-panel').style.display='block'">⚙️</button>
            <button onclick="document.getElementById('sticker-panel').style.display='block'">Stickers 🦆</button>
        </div>

        <div id="settings-panel">
            <h3>Ajustes</h3>
            <label>Idioma: </label>
            <select id="lang"><option value="es">Español</option><option value="en">English</option></select>
            <br><br>
            <label>Tema: </label>
            <button onclick="document.body.className='dark'">Oscuro</button>
            <button onclick="document.body.className=''">Claro</button>
            <br><br><button onclick="this.parentElement.style.display='none'">Cerrar</button>
        </div>

        <div id="sticker-panel">
            <h3>Stickers 🦆</h3>
            <div style="font-size: 30px; cursor: pointer;" onclick="enviarSticker('🦆')">🦆</div>
            <div style="font-size: 30px; cursor: pointer;" onclick="enviarSticker('🐤')">🐤</div>
            <div style="font-size: 30px; cursor: pointer;" onclick="enviarSticker('✨')">✨</div>
            <div style="font-size: 30px; cursor: pointer;" onclick="enviarSticker('🎈')">🎈</div>
            <button onclick="this.parentElement.style.display='none'">Cerrar</button>
        </div>

        <div id="chat"></div>

        <div class="bottom-bar">
            <button class="btn" onclick="enviar()">Enviar</button>
            <input type="text" id="in" placeholder="Dile algo a Duckie...">
            <button class="btn" id="mic">🎤</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        
        async function enviar() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const texto = input.value;
            if(!texto) return;
            chat.innerHTML += `<div class="message u">${texto}</div>`;
            input.value = "";
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
                });
                const data = await res.json();
                const resp = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="message a">${resp}</div>`;
            } catch(e) { chat.innerHTML += `<div class="message a">Duckie está procesando, intenta de nuevo.</div>`; }
        }

        function enviarSticker(s) {
            document.getElementById('chat').innerHTML += `<div class="message u">${s}</div>`;
            document.getElementById('sticker-panel').style.display='none';
        }

        const mic = document.getElementById('mic');
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-ES';
        rec.onresult = (e) => { document.getElementById('in').value = e.results[0][0].transcript; };
        mic.onclick = () => { rec.start(); };
    </script>
</body>
</html>
