    <div class="app-container">
        <div class="header">
            <div class="controls">
                <select onchange="document.documentElement.style.setProperty('--bg-image', 'url(' + this.value + ')')">

                </select>

        </div>
        <div id="chat-container"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribe aquí...">
            <button class="btn" onclick="sendMessage()">➤</button>
            <button class="btn" onclick="startVoice()">🎤</button>
        </div>
    </div>
    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        function addMessage(text, type) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const mode = document.getElementById('ai-mode').value;
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            input.value = "";
            addMessage("...", 'ai');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Modo ${mode}: ${text}` }] }] })
                });
                const data = await response.json();
                document.getElementById('chat-container').lastElementChild.remove();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    addMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    addMessage("No recibí respuesta.", 'ai');
                }
            } catch (e) {
                document.getElementById('chat-container').lastElementChild.innerText = "Error: Verifica tu conexión.";
            }
        }
        function startVoice() {
            try {
                const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                rec.lang = 'es-ES';
                rec.start();
                rec.onresult = (e) => {
                    document.getElementById('user-input').value = e.results[0][0].transcript;
                    sendMessage();
                };
            } catch(e) { addMessage("Voz no soportada.", 'ai'); }
        }
    </script>
