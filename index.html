    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        // He cambiado el modelo a uno compatible universalmente
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${API_KEY}`;
        let history = [];

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            document.getElementById('chat-container').appendChild(div);
            div.scrollIntoView();
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            history.push({ role: "user", parts: [{ text: text }] });
            input.value = "";
            const loader = addMsg("Pensando...", 'ai');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history })
                });
                const data = await res.json();
                loader.remove();
                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    addMsg(reply, 'ai');
                    history.push({ role: "model", parts: [{ text: reply }] });
                } else {
                    addMsg("Error API: " + JSON.stringify(data), 'ai');
                }
            } catch (e) {
                loader.remove();
                addMsg("Error: " + e.message, 'ai');
            }
        }
    </script>
