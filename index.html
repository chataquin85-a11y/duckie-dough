<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk ^+^_</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #e1bee7; }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 75%; font-size: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user-msg { background: #76ff03; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: #ffffff; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { background: #fff; padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { cursor: pointer; font-size: 20px; background: none; border: none; }
        .mic-active { color: red; }
    </style>
</head>
<body>
    <main id="chat-container"></main>
    <footer class="input-area">
        <input type="text" id="user-input" class="input-field" placeholder="Type or press the microphone...">
        <button class="btn" onclick="sendMessage()">➤</button>
        <button class="btn" id="mic-btn" onclick="startVoice()">🎤</button>
    </footer>

    <script>
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            if (input.value.trim() === "") return;
            addMessage(input.value, 'user');
            input.value = "";
            // Aquí es donde después conectaremos la API real
            setTimeout(() => addMessage("Procesando tu mensaje...", 'ai'), 500);
        }

        function startVoice() {
            const micBtn = document.getElementById('mic-btn');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.start();
            micBtn.classList.add('mic-active');

            recognition.onresult = (event) => {
                document.getElementById('user-input').value = event.results[0][0].transcript;
                micBtn.classList.remove('mic-active');
                sendMessage();
            };

            recognition.onerror = () => { micBtn.classList.remove('mic-active'); };
            recognition.onend = () => { micBtn.classList.remove('mic-active'); };
        }
    </script>
</body>
</html>
