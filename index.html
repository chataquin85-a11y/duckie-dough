<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk ^+^_</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; transition: background 0.3s; }
        
        /* Paleta de Colores Solicitada */
        .theme-dark-green { background: #004d40; color: #fff; }
        .theme-medium-green { background: #4caf50; color: #fff; }
        .theme-light-green { background: #c8e6c9; color: #000; }
        .theme-dark-purple { background: #4a148c; color: #fff; }
        .theme-medium-purple { background: #9c27b0; color: #fff; }
        .theme-light-purple { background: #e1bee7; color: #000; }

        header { background: rgba(255,255,255,0.9); padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #ddd; justify-content: space-between; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .user-msg { background: #dcf8c6; align-self: flex-end; color: #000; }
        .ai-msg { background: #fff; align-self: flex-start; color: #000; }
        
        .panel { padding: 10px; background: #eee; border-bottom: 1px solid #ccc; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .sticker { cursor: pointer; font-size: 24px; }
        
        .input-area { background: #fff; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { cursor: pointer; font-size: 22px; background: none; border: none; }
    </style>
</head>
<body class="theme-light-purple">

    <header role="banner">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="IMG_0494.jpeg" alt="Avatar" class="profile-avatar">
            <div><strong>Duckie Talk ^+^_</strong></div>
        </div>
    </header>

    <div class="panel">
        <select id="bg-selector" onchange="changeTheme()">
            <option value="theme-light-purple">Púrpura Claro</option>
            <option value="theme-medium-purple">Púrpura Med</option>
            <option value="theme-dark-purple">Púrpura Oscuro</option>
            <option value="theme-light-green">Verde Claro</option>
            <option value="theme-medium-green">Verde Med</option>
            <option value="theme-dark-green">Verde Oscuro</option>
        </select>
        <select id="ai-personality" onchange="updateAI()">
            <option value="Amistoso">Amistoso</option>
            <option value="Profesional">Profesional</option>
            <option value="Creativo">Creativo</option>
        </select>
        <div style="flex:1"></div>
        <span class="sticker" onclick="sendSticker('🦆')">🦆</span>
        <span class="sticker" onclick="sendSticker('🐥')">🐥</span>
        <span class="sticker" onclick="sendSticker('✨')">✨</span>
        <span class="sticker" onclick="sendSticker('💜')">💜</span>
        <span class="sticker" onclick="sendSticker('💚')">💚</span>
    </div>

    <main id="chat-container" role="main"></main>

    <footer class="input-area" role="contentinfo">
        <input type="text" id="user-input" class="input-field" placeholder="Escribe o habla...">
        <button class="btn" onclick="sendMessage()">➤</button>
        <button class="btn" onclick="startVoice()">🎤</button>
    </footer>

    <script>
        function changeTheme() { document.body.className = document.getElementById('bg-selector').value; }
        function updateAI() { addMessage("Modo IA cambiado a: " + document.getElementById('ai-personality').value, 'ai'); }
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        function sendSticker(emoji) { addMessage(emoji, 'user'); }
        function sendMessage() {
            const input = document.getElementById('user-input');
            if (input.value.trim() === "") return;
            addMessage(input.value, 'user');
            input.value = "";
            setTimeout(() => addMessage("Analizando tu petición...", 'ai'), 1000);
        }
        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.start();
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                sendMessage();
            };
        }
    </script>
</body>
</html>
