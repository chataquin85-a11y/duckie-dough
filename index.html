<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk ^+^_</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background-image: url('IMG_0635.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: contrast(1.1) saturate(1.2) brightness(1.05);
        }
        #chat-container { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .message { 
            padding: 12px 18px; 
            border-radius: 18px; 
            max-width: 75%; 
            font-size: 16px; 
            background: rgba(255, 255, 255, 0.85); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
        .user-msg { background: rgba(118, 255, 3, 0.9); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: rgba(255, 255, 255, 0.9); align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { background: rgba(255, 255, 255, 0.95); padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { cursor: pointer; font-size: 20px; background: none; border: none; }
        .mic-active { color: red; }
    </style>
</head>
<body>
    <main id="chat-container"></main>
    <footer class="input-area">
        <input type="text" id="user-input" class="input-field" placeholder="Type or press the microphone...">
        <button class="btn" onclick="sendMessage()">➤</button>
        <button class="btn" id="mic-btn" onclick="startVoice()">🎤</button>
    </footer>

    <script>
        const API_KEY = "AIzaSyBLFvUDnCikCBd8uvXDACsMYWMHIXuhTSY"; 

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const userText = input.value.trim();
            if (userText === "") return;

            addMessage(userText, 'user');
            input.value = "";
            addMessage("Duckie está pensando...", 'ai');

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                const aiMessages = document.querySelectorAll('.ai-msg');
                aiMessages[aiMessages.length - 1].innerText = aiResponse;
            } catch (error) {
                const aiMessages = document.querySelectorAll('.ai-msg');
                aiMessages[aiMessages.length - 1].innerText = "Ups, algo salió mal. ¡Revisa tu conexión!";
            }
        }

        function startVoice() {
            const micBtn = document.getElementById('mic-btn');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.start();
            micBtn.classList.add('mic-active');
            recognition.onresult = (event) => {
                document.getElementById('user-input').value = event.results[0][0].transcript;
                micBtn.classList.remove('mic-active');
                sendMessage();
            };
            recognition.onerror = () => { micBtn.classList.remove('mic-active'); };
            recognition.onend = () => { micBtn.classList.remove('mic-active'); };
        }
    </script>
</body>
</html>
