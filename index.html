<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk ^+^_</title>
    <style>
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            background-image: url('IMG_0635.jpeg'); background-size: cover; 
            background-position: center; background-attachment: fixed;
            filter: contrast(1.1) saturate(1.2) brightness(1.05);
        }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 75%; font-size: 16px; background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .user-msg { background: rgba(118, 255, 3, 0.9); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: rgba(255, 255, 255, 0.9); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .controls { background: rgba(255,255,255,0.9); padding: 10px; display: flex; justify-content: space-around; border-bottom: 1px solid #ddd; }
        .sticker-btn { cursor: pointer; font-size: 24px; border: none; background: none; transition: transform 0.2s; }
        .sticker-btn:active { transform: scale(1.2); }
        
        .input-area { background: rgba(255, 255, 255, 0.95); padding: 12px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { cursor: pointer; font-size: 20px; background: none; border: none; color: #333; }
    </style>
</head>
<body>
    <div class="controls">
        <button class="sticker-btn" onclick="addSticker('🌟')">🌟</button>
        <button class="sticker-btn" onclick="addSticker('🦆')">🦆</button>
        <button class="sticker-btn" onclick="toggleFaceFilter()">🎭</button>
    </div>
    <main id="chat-container"></main>
    <footer class="input-area">
        <input type="text" id="user-input" class="input-field" placeholder="Habla con Duckie...">
        <button class="btn" onclick="sendMessage()">➤</button>
        <button class="btn" id="mic-btn" onclick="startVoice()">🎤</button>
    </footer>

    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg"; 

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addSticker(emoji) { 
            addMessage(emoji, 'user'); 
        }

        function toggleFaceFilter() { 
            alert("Modo Face App activado: ¡Cargando filtros de realidad aumentada!"); 
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const userText = input.value.trim();
            if (userText === "") return;

            addMessage(userText, 'user');
            input.value = "";
            addMessage("Duckie procesando...", 'ai');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] }),
                    mode: 'cors'
                });
                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                const aiMessages = document.querySelectorAll('.ai-msg');
                aiMessages[aiMessages.length - 1].innerText = aiResponse;
            } catch (error) {
                const aiMessages = document.querySelectorAll('.ai-msg');
                aiMessages[aiMessages.length - 1].innerText = "Error: Verifica tu conexión a Internet o los permisos de red.";
            }
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.start();
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                sendMessage();
            };
        }
    </script>
</body>
</html>
