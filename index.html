<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk</title>
    <style>
        /* Ajuste del fondo para que sea inmersivo */
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('background_image.jpg'); 
            background-size: cover;
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        /* Cabecera con la "Face App" (image_13.png) */
        header { background: #fff; padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #ddd; justify-content: space-between; }
        .header-info { display: flex; align-items: center; gap: 12px; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #f0f0f0; }
        
        /* Area de Chat */
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: rgba(255,255,255,0.9); }
        
        /* Barra de acciones inferior */
        .input-area { background: #fff; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { cursor: pointer; font-size: 22px; background: none; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <!-- Aquí se integra la "Face App" definida en image_14.png -->
            <img src="image_13.png" alt="Duckie Talk" class="profile-avatar">
            <div>
                <strong>Duckie Talk ^+^_</strong><br>
                <small>Tu wingman digital</small>
            </div>
        </div>
        <div>🔗 •••</div>
    </header>

    <div id="chat-container">
        <!-- Los mensajes aparecerán aquí -->
    </div>

    <div class="input-area">
        <button class="btn">+</button>
        <input type="text" class="input-field" placeholder="Mensaje...">
        <button class="btn">🎤</button>
    </div>

    <script>
        // Lógica lista para conectar la voz en el siguiente paso
    </script>
</body>
</html>
