<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk Pro</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; }
        .app-container { height: 100%; display: flex; flex-direction: column; background: #fff; }
        
        /* Header */
        .header { background: #6a1b9a; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header-title { font-weight: bold; font-size: 1.2em; }
        
        /* Chat Area */
        #chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 16px; }
        .user { background: #6a1b9a; color: white; align-self: flex-end; }
        .duckie { background: #e0e0e0; color: #333; align-self: flex-start; }
        
        /* Input Bar */
        .input-bar { padding: 15px; border-top: 1px solid #ddd; display: flex; align-items: center; gap: 10px; background: #fff; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { border: none; background: none; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <span>⚙️</span>
            <span class="header-title">DUCKIE TALK</span>
            <span>🦆</span>
        </div>
        <div id="chat">
            <div class="msg duckie">Hi there! How can I help you today?</div>
        </div>
        <div class="input-bar">
            <button onclick="alert('Stickers: 🦆, 🐥, 🐤')">🎭</button>
            <input type="text" id="in" placeholder="Message...">
            <button id="mic">🎤</button>
            <button onclick="enviar()">➤</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBruM7_YMp6qkYcez9J5Hb6h3BgCyhDyHg";
        
        async function enviar() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            if(!input.value) return;
            
            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            const userText = input.value;
            input.value = "";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg duckie">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch(e) { chat.innerHTML += `<div class="msg duckie">Duckie is having a connection issue!</div>`; }
        }

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.onresult = (e) => { document.getElementById('in').value = e.results[0][0].transcript; };
        document.getElementById('mic').onclick = () => { rec.start(); };
    </script>
</body>
</html>
