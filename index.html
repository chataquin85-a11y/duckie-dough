<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        
        /* Cabecera estilo limpio */
        header { background: #fff; padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; justify-content: space-between; }
        .header-info { display: flex; align-items: center; gap: 12px; }
        .profile-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        
        /* Area de Chat */
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #e5ddd5; }
        
        /* Barra de acciones inferior */
        .input-area { background: #fff; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { cursor: pointer; font-size: 20px; background: none; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <img src="image_13.png" alt="Duckie Talk" class="profile-avatar">
            <div>
                <strong>Duckie Talk ^+^_</strong><br>
                <small>Tu wingman digital</small>
            </div>
        </div>
        <div>🔗 •••</div>
    </header>

    <div id="chat-container">
        <!-- Los mensajes aparecerán aquí -->
    </div>

    <div class="input-area">
        <button class="btn">+</button>
        <input type="text" class="input-field" placeholder="Mensaje...">
        <button class="btn">📷</button>
        <button class="btn" onclick="startVoice()">🎤</button>
    </div>

    <script>
        function startVoice() {
            alert("Modo voz activado: ¡Dime qué tenemos para hoy, Amado!");
            // Aquí integraremos la Web Speech API en el siguiente paso
        }
    </script>
</body>
</html>
