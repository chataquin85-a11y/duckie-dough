<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk ^+^_</title>
    <style>
        /* Estilos base */
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; transition: background 0.3s; }
        
        /* Duckie Themes */
        .theme-duckie-sun { background: linear-gradient(180deg, #fff9c4, #fff176); }
        .theme-duckie-pond { background: linear-gradient(180deg, #e0f7fa, #b2ebf2); }
        .theme-dark { background: #121212; color: #fff; }

        /* Estructura */
        header { background: rgba(255,255,255,0.9); padding: 12px; display: flex; align-items: center; border-bottom: 1px solid #ddd; justify-content: space-between; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Mensajes */
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .user-msg { background: #dcf8c6; align-self: flex-end; color: #000; }
        .ai-msg { background: #fff; align-self: flex-start; color: #000; }
        
        /* Panel IA y Stickers */
        .panel { padding: 10px; background: #eee; border-bottom: 1px solid #ccc; display: flex; gap: 10px; align-items: center; }
        .sticker { cursor: pointer; font-size: 20px; transition: transform 0.2s; }
        .sticker:hover { transform: scale(1.2); }
        
        .input-area { background: #fff; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-field { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn { cursor: pointer; font-size: 22px; background: none; border: none; }
    </style>
</head>
<body class="theme-duckie-sun">

    <header role="banner">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="IMG_0494.jpeg" alt="Duckie Talk Avatar" class="profile-avatar">
            <div><strong>Duckie Talk ^+^_</strong></div>
        </div>
        <select id="bg-selector" onchange="changeTheme()" class="btn" style="font-size: 16px;">
            <option value="theme-duckie-sun">Sun</option>
            <option value="theme-duckie-pond">Pond</option>
            <option value="theme-dark">Night</option>
        </select>
    </header>

    <div class="panel">
        <select id="ai-personality" onchange="updateAI()">
            <option value="Amistoso">Duckie Amistoso</option>
            <option value="Profesional">Duckie Profesional</option>
            <option value="Creativo">Duckie Creativo</option>
        </select>
        <div style="flex:1"></div>
        <span class="sticker" onclick="sendSticker('🦆')">🦆</span>
        <span class="sticker" onclick="sendSticker('✨')">✨</span>
        <span class="sticker" onclick="sendSticker('🚀')">🚀</span>
    </div>

    <main id="chat-container" role="main"></main>

    <footer class="input-area" role="contentinfo">
        <input type="text" id="user-input" class="input-field" placeholder="Escribe o habla..." aria-label="Mensaje">
        <button class="btn" onclick="sendMessage()" aria-label="Enviar">➤</button>
        <button class="btn" onclick="startVoice()" aria-label="Grabar voz">🎤</button>
    </footer>

    <script>
        let currentPersona = "Duckie Amistoso";

        function updateAI() {
            currentPersona = document.getElementById('ai-personality').value;
            addMessage("Modo IA cambiado a: " + currentPersona, 'ai');
        }

        function changeTheme() {
            document.body.className = document.getElementById('bg-selector').value;
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-msg`;
            div.innerText = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function sendSticker(emoji) { addMessage(emoji, 'user'); }

        function sendMessage() {
            const input = document.getElementById('user-input');
            if (input.value.trim() === "") return;
            addMessage(input.value, 'user');
            input.value = "";
            setTimeout(() => addMessage(`[${currentPersona}]: Entendido, analizando tu petición.`, 'ai'), 1000);
        }

        document.getElementById("user-input").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'es-ES';
            rec.start();
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                sendMessage();
            };
        }
    </script>
</body>
</html>
